<!doctype html>
<html lang="en" data-theme="golden">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Chrome</title>
    <link rel="stylesheet" href="/global.css" />
    <style>
      html { font-size: 16px; }
      body { font: 16px/1.5 system-ui, sans-serif; margin: 0; }
      /* Mirrors Frame.svelte's layout closely enough for the sidebar to be the
         adjacent sibling of .journal-page, which its `+` selectors depend on. */
      #frame { display: grid; grid-template-columns: 200px 1fr; height: 100vh; }
    </style>
  </head>
  <body>
    <div id="frame">
      <div class="journal-left-sidebar open"></div>
      <!-- Page.svelte mounts its <main class="journal-page ..."> here, as the
           sidebar's next sibling. -->
    </div>
    <script type="module" src="./harness.js"></script>
  </body>
</html>
